<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZYMEET</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #001a0d 0%, #000000 100%);
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 420px;
            width: 90%;
        }

        .logo {
            font-size: 56px;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 12px;
            color: #666;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 16px;
            padding: 40px 32px;
        }

        .card h2 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 24px;
            font-weight: 600;
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #fff;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 255, 136, 0.3);
        }

        .input-group input::placeholder {
            color: #555;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            background: #00ff88;
            color: #000;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #00cc6a;
            transform: translateY(-1px);
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            text-align: center;
        }

        .error-message.show {
            display: block;
        }

        .info {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #666;
        }

        .room-code {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 24px;
        }

        .room-code-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .room-code-value {
            font-size: 24px;
            font-weight: 700;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="background"></div>

    <div class="container">
        <div class="logo">OZYMEET</div>
        <div class="tagline">Professional Trading Conference</div>

        <div class="card">
            <div class="room-code">
                <div class="room-code-label">Código de Sala</div>
                <div class="room-code-value">TRADING2025</div>
            </div>

            <h2>Acceso</h2>
            
            <div class="input-group">
                <label>Tu Nombre</label>
                <input 
                    type="text" 
                    id="nameInput" 
                    placeholder="Ingresa tu nombre"
                    autocomplete="off"
                    maxlength="30"
                >
            </div>

            <button class="btn" onclick="enterRoom()">ENTRAR A LA SALA</button>

            <div class="error-message" id="errorMessage"></div>

            <div class="info">
                Sala permanente · Código fijo
            </div>
        </div>
    </div>

    <script>
        const ROOM_CODE = 'TRADING2025';
        const ADMIN_PASSWORD = '0909';

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
        }

        function enterRoom() {
            const name = document.getElementById('nameInput').value.trim();

            if (!name) {
                showError('Por favor ingresa tu nombre');
                return;
            }

            // Detectar si es admin (nombre específico o pregunta)
            const isAdmin = name.toLowerCase() === 'admin' || name.toLowerCase() === 'ozy';
            
            if (isAdmin) {
                const password = prompt('Password de administrador:');
                if (password === ADMIN_PASSWORD) {
                    sessionStorage.setItem('ozymeet_session', JSON.stringify({
                        userName: name,
                        role: 'admin',
                        roomId: ROOM_CODE
                    }));
                    window.location.href = `/room/${ROOM_CODE}`;
                } else {
                    showError('Password de admin incorrecto');
                }
            } else {
                sessionStorage.setItem('ozymeet_session', JSON.stringify({
                    userName: name,
                    role: 'participant',
                    roomId: ROOM_CODE
                }));
                window.location.href = `/room/${ROOM_CODE}`;
            }
        }

        document.getElementById('nameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enterRoom();
        });
    </script>
</body>
</html>
