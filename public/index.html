<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZYMEET - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #001a0d 0%, #000000 100%);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 420px;
            width: 90%;
        }

        .logo {
            font-size: 56px;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 12px;
            color: #666;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 16px;
            padding: 40px 32px;
            backdrop-filter: blur(20px);
        }

        .card h2 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 24px;
            font-weight: 600;
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #fff;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 255, 136, 0.3);
        }

        .input-group input::placeholder {
            color: #555;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            background: #00ff88;
            color: #000;
        }

        .btn:hover {
            background: #00cc6a;
            transform: translateY(-1px);
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .info {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="background"></div>

    <div class="container">
        <div class="logo">OZYMEET</div>
        <div class="tagline">Professional Conference</div>

        <div class="card">
            <h2>Acceso a la Sala</h2>
            
            <div class="input-group">
                <label>Nombre</label>
                <input 
                    type="text" 
                    id="nameInput" 
                    placeholder="Tu nombre"
                    autocomplete="off"
                    maxlength="30"
                >
            </div>

            <div class="input-group">
                <label>Password</label>
                <input 
                    type="password" 
                    id="passwordInput" 
                    placeholder="Ingresa tu password"
                    autocomplete="off"
                >
            </div>

            <button class="btn" onclick="enterRoom()">ENTRAR</button>

            <div class="error-message" id="errorMessage"></div>

            <div class="info">
                Sala única permanente · Código fijo
            </div>
        </div>
    </div>

    <script>
        const ROOM_ID = 'OZYMEET-MAIN';

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 3000);
        }

        async function enterRoom() {
            const name = document.getElementById('nameInput').value.trim();
            const password = document.getElementById('passwordInput').value;

            if (!name) {
                showError('Por favor ingresa tu nombre');
                return;
            }

            if (!password) {
                showError('Por favor ingresa el password');
                return;
            }

            try {
                const response = await fetch('/authenticate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        roomId: ROOM_ID,
                        userName: name,
                        password: password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    sessionStorage.setItem('ozymeet_auth', JSON.stringify({
                        userName: name,
                        password: password,
                        role: data.role,
                        roomId: ROOM_ID
                    }));
                    
                    window.location.href = `/room/${ROOM_ID}`;
                } else {
                    showError(data.message || 'Password incorrecto');
                }

            } catch (error) {
                console.error('Error:', error);
                showError('Error al conectar');
            }
        }

        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enterRoom();
        });

        document.getElementById('nameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('passwordInput').focus();
        });
    </script>
</body>
</html>
