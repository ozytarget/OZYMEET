<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZYMEET - Trading Conference Platform</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #050816 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .landing-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
        }
        
        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #00ff88, #00cc6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }
        
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }
        
        .btn {
            padding: 18px 35px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00ff88, #00cc6e);
            color: #0a0e27;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 255, 136, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }
        
        .features {
            margin-top: 50px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        
        .feature {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }
        
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }
        
        .feature-text {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .input-container {
            display: none;
            margin-top: 30px;
        }
        
        .input-container.active {
            display: block;
        }
        
        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            margin-bottom: 15px;
        }
        
        input:focus {
            outline: none;
            border-color: #00ff88;
        }
        
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="logo">🎯📊💹</div>
        <h1>OZYMEET</h1>
        <p class="subtitle">Professional Trading Conference Platform</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🎤</div>
                <div class="feature-text">Audio HD 20 traders</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🖥️</div>
                <div class="feature-text">2 pantallas simultáneas</div>
            </div>
            <div class="feature">
                <div class="feature-icon">✏️</div>
                <div class="feature-text">Dibujo colaborativo</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🐂🐻</div>
                <div class="feature-text">Reacciones Trading</div>
            </div>
        </div>
        
        <div id="initialButtons" class="action-buttons">
            <button class="btn btn-primary" onclick="showCreateRoom()">
                🚀 Crear Nueva Sala
            </button>
            <button class="btn btn-secondary" onclick="showJoinRoom()">
                🔗 Unirse a Sala Existente
            </button>
        </div>
        
        <div id="createRoomInput" class="input-container">
            <h3 style="margin-bottom: 20px;">Crear Nueva Sala</h3>
            <input type="text" id="createRoomPassword" placeholder="Contraseña (opcional)">
            <button class="btn btn-primary" onclick="createRoom()">Crear Sala</button>
            <button class="btn btn-secondary" onclick="goBack()" style="margin-top: 10px;">Atrás</button>
        </div>
        
        <div id="joinRoomInput" class="input-container">
            <h3 style="margin-bottom: 20px;">Unirse a Sala</h3>
            <input type="text" id="joinRoomCode" placeholder="Código de sala (6 dígitos)">
            <button class="btn btn-primary" onclick="joinRoom()">Entrar</button>
            <button class="btn btn-secondary" onclick="goBack()" style="margin-top: 10px;">Atrás</button>
        </div>
    </div>
    
    <script>
        function showCreateRoom() {
            document.getElementById('initialButtons').style.display = 'none';
            document.getElementById('createRoomInput').classList.add('active');
        }
        
        function showJoinRoom() {
            document.getElementById('initialButtons').style.display = 'none';
            document.getElementById('joinRoomInput').classList.add('active');
        }
        
        function goBack() {
            document.getElementById('createRoomInput').classList.remove('active');
            document.getElementById('joinRoomInput').classList.remove('active');
            document.getElementById('initialButtons').style.display = 'flex';
        }
        
        function createRoom() {
            const password = document.getElementById('createRoomPassword').value;
            const roomId = Math.floor(100000 + Math.random() * 900000);
            
            if (password) {
                localStorage.setItem(`room_${roomId}_password`, password);
            }
            
            window.location.href = `/room.html?room=${roomId}`;
        }
        
        function joinRoom() {
            const roomCode = document.getElementById('joinRoomCode').value.trim();
            
            if (!roomCode || roomCode.length !== 6) {
                alert('⚠️ Por favor ingresa un código de sala válido (6 dígitos)');
                return;
            }
            
            window.location.href = `/room.html?room=${roomCode}`;
        }
        
        // Allow Enter key to join
        document.getElementById('joinRoomCode')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') joinRoom();
        });
    </script>
</body>
</html>
