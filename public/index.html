<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OZYMEET - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }

    .login-header {
      grid-column: 1 / -1;
      text-align: center;
      margin-bottom: 20px;
    }

    .login-header h1 {
      color: #667eea;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .login-header p {
      color: #666;
      font-size: 1rem;
    }

    .divider {
      width: 2px;
      background: linear-gradient(to bottom, transparent, #667eea, transparent);
      margin: 0 -20px;
    }

    .login-section {
      display: flex;
      flex-direction: column;
    }

    .login-section h2 {
      color: #333;
      margin-bottom: 20px;
      text-align: center;
      font-size: 1.5rem;
    }

    .admin-section h2 {
      color: #667eea;
    }

    .guest-section h2 {
      color: #764ba2;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #555;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1rem;
      transition: all 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-admin {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-admin:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-guest {
      background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
      color: white;
    }

    .btn-guest:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
    }

    .error-message {
      color: #e74c3c;
      font-size: 0.9rem;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .info-text {
      color: #888;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 15px;
    }

    @media (max-width: 768px) {
      .login-container {
        grid-template-columns: 1fr;
        padding: 30px 20px;
      }

      .divider {
        display: none;
      }

      .login-header h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🚀 OZYMEET</h1>
      <p>Plataforma Profesional de Trading</p>
    </div>

    <!-- SECCIÓN ADMINISTRADORES -->
    <div class="login-section admin-section">
      <h2>👑 Administradores</h2>
      
      <div class="form-group">
        <label for="adminSelect">Seleccionar Admin:</label>
        <select id="adminSelect">
          <option value="">-- Selecciona tu nombre --</option>
          <option value="Ozy">Ozy</option>
        </select>
      </div>

      <div class="form-group">
        <label for="adminPassword">Contraseña:</label>
        <input type="password" id="adminPassword" placeholder="Ingresa tu contraseña">
      </div>

      <button class="btn btn-admin" onclick="loginAsAdmin()">
        Entrar como Admin
      </button>

      <div class="error-message" id="adminError"></div>
      
      <p class="info-text">
        ✨ Permisos: Grabar, Mutear, Hosting
      </p>
    </div>

    <div class="divider"></div>

    <!-- SECCIÓN INVITADOS -->
    <div class="login-section guest-section">
      <h2>👥 Invitados</h2>
      
      <div class="form-group">
        <label for="guestName">Tu Nombre:</label>
        <input type="text" id="guestName" placeholder="Escribe tu nombre">
      </div>

      <button class="btn btn-guest" onclick="loginAsGuest()">
        Entrar como Invitado
      </button>

      <div class="error-message" id="guestError"></div>
      
      <p class="info-text">
        🎯 Acceso directo a la sala
      </p>
    </div>
  </div>

  <script>
    // Credenciales de administradores hardcoded
    const ADMIN_CREDENTIALS = {
      'Ozy': '0909'
    };

    // Código de sala fijo
    const ROOM_CODE = 'TRADING2025';

    function loginAsAdmin() {
      const adminName = document.getElementById('adminSelect').value;
      const password = document.getElementById('adminPassword').value;
      const errorDiv = document.getElementById('adminError');

      // Validaciones
      if (!adminName) {
        showError(errorDiv, 'Por favor selecciona tu nombre');
        return;
      }

      if (!password) {
        showError(errorDiv, 'Por favor ingresa tu contraseña');
        return;
      }

      // Verificar credenciales
      if (ADMIN_CREDENTIALS[adminName] !== password) {
        showError(errorDiv, 'Contraseña incorrecta');
        return;
      }

      // Login exitoso
      sessionStorage.setItem('userName', adminName);
      sessionStorage.setItem('isAdmin', 'true');
      sessionStorage.setItem('roomId', ROOM_CODE);
      
      window.location.href = '/room.html';
    }

    function loginAsGuest() {
      const guestName = document.getElementById('guestName').value.trim();
      const errorDiv = document.getElementById('guestError');

      // Validación
      if (!guestName) {
        showError(errorDiv, 'Por favor ingresa tu nombre');
        return;
      }

      if (guestName.length < 2) {
        showError(errorDiv, 'El nombre debe tener al menos 2 caracteres');
        return;
      }

      // Login exitoso
      sessionStorage.setItem('userName', guestName);
      sessionStorage.setItem('isAdmin', 'false');
      sessionStorage.setItem('roomId', ROOM_CODE);
      
      window.location.href = '/room.html';
    }

    function showError(element, message) {
      element.textContent = message;
      element.style.display = 'block';
      setTimeout(() => {
        element.style.display = 'none';
      }, 3000);
    }

    // Limpiar session storage al cargar
    sessionStorage.clear();

    // Enter key handlers
    document.getElementById('adminPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginAsAdmin();
    });

    document.getElementById('guestName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginAsGuest();
    });
  </script>
</body>
</html>
