<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OZYMEET - Entrar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 50px 40px;
      width: 100%;
      max-width: 450px;
      text-align: center;
    }

    .login-header h1 {
      color: #667eea;
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .login-header p {
      color: #666;
      font-size: 1.1rem;
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 30px;
      text-align: left;
    }

    label {
      display: block;
      color: #555;
      margin-bottom: 10px;
      font-weight: 600;
      font-size: 1rem;
    }

    input {
      width: 100%;
      padding: 15px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 1.1rem;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
    }

    .btn:active {
      transform: translateY(-1px);
    }

    .error-message {
      color: #e74c3c;
      font-size: 0.95rem;
      margin-top: 15px;
      display: none;
    }

    .info-box {
      background: #f8f9ff;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 8px;
      margin-top: 30px;
      text-align: left;
    }

    .info-box p {
      color: #555;
      font-size: 0.9rem;
      line-height: 1.6;
      margin: 0;
    }

    @media (max-width: 768px) {
      .login-container {
        padding: 40px 25px;
      }

      .login-header h1 {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>🚀 OZYMEET</h1>
      <p>Sala de Trading Profesional</p>
    </div>

    <div class="form-group">
      <label for="userName">Tu Nombre:</label>
      <input 
        type="text" 
        id="userName" 
        placeholder="Escribe tu nombre" 
        autofocus
        maxlength="30"
      >
    </div>

    <button class="btn" onclick="joinRoom()">
      Entrar a la Sala
    </button>

    <div class="error-message" id="errorMessage"></div>

    <div class="info-box">
      <p>
        📌 <strong>Acceso libre:</strong> Solo ingresa tu nombre y entra directamente a la sala de trading.
      </p>
    </div>
  </div>

  <script>
    const ROOM_CODE = 'TRADING2025';

    function joinRoom() {
      const userName = document.getElementById('userName').value.trim();
      const errorDiv = document.getElementById('errorMessage');

      if (!userName) {
        showError('Por favor ingresa tu nombre');
        return;
      }

      if (userName.length < 2) {
        showError('El nombre debe tener al menos 2 caracteres');
        return;
      }

      // Guardar en sessionStorage
      sessionStorage.setItem('userName', userName);
      sessionStorage.setItem('roomId', ROOM_CODE);
      
      // Ir a sala
      window.location.href = '/room.html';
    }

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 3000);
    }

    // Enter para enviar
    document.getElementById('userName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        joinRoom();
      }
    });

    // Limpiar session storage
    sessionStorage.clear();
  </script>
</body>
</html>
