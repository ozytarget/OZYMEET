<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZYMEET</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #001a0d 0%, #000000 100%);
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            width: 90%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .logo-section {
            grid-column: 1 / -1;
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 56px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 12px;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .room-code {
            grid-column: 1 / -1;
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            padding: 16px;
            border-radius: 12px;
            text-align: center;
        }

        .room-code-label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .room-code-value {
            font-size: 28px;
            font-weight: 700;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
        }

        .card {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.15);
            border-radius: 16px;
            padding: 32px 28px;
        }

        .card h2 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 24px;
            font-weight: 600;
            text-align: center;
        }

        .card h2 i {
            color: #00ff88;
            margin-right: 8px;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #fff;
            outline: none;
            transition: all 0.2s;
        }

        .input-group select {
            cursor: pointer;
        }

        .input-group input:focus,
        .input-group select:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 255, 136, 0.3);
        }

        .input-group input::placeholder {
            color: #555;
        }

        .input-group select option {
            background: #0a0e27;
            color: #fff;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .btn-admin {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #000;
        }

        .btn-admin:hover {
            background: #00cc6a;
            transform: translateY(-1px);
        }

        .btn-guest {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-guest:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
        }

        .info {
            text-align: center;
            margin-top: 16px;
            font-size: 11px;
            color: #666;
            line-height: 1.5;
        }

        .divider {
            grid-column: 1 / -1;
            text-align: center;
            color: #444;
            font-size: 12px;
            margin: 8px 0;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .logo {
                font-size: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>

    <div class="container">
        <div class="logo-section">
            <div class="logo">OZYMEET</div>
            <div class="tagline">Professional Trading Conference</div>
        </div>

        <div class="room-code">
            <div class="room-code-label">Código de Sala</div>
            <div class="room-code-value">TRADING2025</div>
        </div>

        <!-- OPCIÓN 1: ADMINISTRADORES -->
        <div class="card">
            <h2><i class="fas fa-shield-alt"></i> Administradores</h2>
            
            <div class="input-group">
                <label>Selecciona tu nombre</label>
                <select id="adminSelect">
                    <option value="">-- Seleccionar --</option>
                    <option value="Ozy">Ozy</option>
                    <!-- Aquí se agregarán más admins a futuro -->
                </select>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input 
                    type="password" 
                    id="adminPassword" 
                    placeholder="Ingresa tu password"
                >
            </div>

            <button class="btn btn-admin" onclick="enterAsAdmin()">
                ENTRAR COMO ADMIN
            </button>

            <div class="info">
                Acceso con permisos especiales:<br>
                Grabar · Mutear todos · Dar hosting
            </div>
        </div>

        <!-- OPCIÓN 2: INVITADOS -->
        <div class="card">
            <h2><i class="fas fa-user"></i> Invitados</h2>
            
            <div class="input-group">
                <label>Tu Nombre</label>
                <input 
                    type="text" 
                    id="guestName" 
                    placeholder="Ingresa tu nombre"
                    autocomplete="off"
                    maxlength="30"
                >
            </div>

            <button class="btn btn-guest" onclick="enterAsGuest()">
                ENTRAR COMO INVITADO
            </button>

            <div class="info">
                Acceso estándar sin password<br>
                Participación normal en la sala
            </div>
        </div>
    </div>

    <script>
        const ROOM_CODE = 'TRADING2025';
        const ADMIN_PASSWORDS = {
            'Ozy': '0909'
            // Agregar más admins aquí: 'NombreAdmin': 'password'
        };

        function enterAsAdmin() {
            const adminName = document.getElementById('adminSelect').value;
            const password = document.getElementById('adminPassword').value;

            if (!adminName) {
                alert('Por favor selecciona tu nombre de administrador');
                return;
            }

            if (!password) {
                alert('Por favor ingresa tu password');
                return;
            }

            if (ADMIN_PASSWORDS[adminName] !== password) {
                alert('Password incorrecto');
                return;
            }

            sessionStorage.setItem('ozymeet_session', JSON.stringify({
                userName: adminName,
                role: 'admin',
                roomId: ROOM_CODE
            }));
            
            window.location.href = `/room/${ROOM_CODE}`;
        }

        function enterAsGuest() {
            const name = document.getElementById('guestName').value.trim();

            if (!name) {
                alert('Por favor ingresa tu nombre');
                return;
            }

            sessionStorage.setItem('ozymeet_session', JSON.stringify({
                userName: name,
                role: 'guest',
                roomId: ROOM_CODE
            }));
            
            window.location.href = `/room/${ROOM_CODE}`;
        }

        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enterAsAdmin();
        });

        document.getElementById('guestName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') enterAsGuest();
        });
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
