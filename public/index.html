<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZYMEET</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #001a0d 0%, #000000 100%);
            z-index: 0;
        }

        .grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 480px;
            width: 90%;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo {
            font-size: 64px;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 13px;
            color: #666;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .main-card {
            background: rgba(10, 10, 10, 0.6);
            border: 1px solid rgba(0, 255, 136, 0.1);
            border-radius: 16px;
            padding: 40px 32px;
            backdrop-filter: blur(20px);
        }

        .input-container {
            position: relative;
            margin-bottom: 16px;
        }

        .input-container input {
            width: 100%;
            padding: 20px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            color: #fff;
            outline: none;
            transition: all 0.2s;
            font-family: 'Courier New', monospace;
            text-align: center;
            letter-spacing: 2px;
        }

        .input-container input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 255, 136, 0.3);
        }

        .input-container input::placeholder {
            color: #555;
            letter-spacing: 1px;
        }

        .btn {
            width: 100%;
            padding: 20px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-join {
            background: #00ff88;
            color: #000;
            margin-bottom: 12px;
        }

        .btn-join:hover {
            background: #00cc6a;
            transform: translateY(-1px);
        }

        .btn-join:active {
            transform: translateY(0);
        }

        .separator {
            text-align: center;
            margin: 24px 0;
            color: #444;
            font-size: 12px;
            position: relative;
        }

        .separator::before,
        .separator::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(255, 255, 255, 0.05);
        }

        .separator::before {
            left: 0;
        }

        .separator::after {
            right: 0;
        }

        .btn-create {
            background: transparent;
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .btn-create:hover {
            background: rgba(0, 255, 136, 0.05);
            border-color: rgba(0, 255, 136, 0.4);
        }

        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 255, 136, 0.1) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.5; transform: translate(-50%, -50%) scale(1.1); }
        }

        @media (max-width: 600px) {
            .logo {
                font-size: 48px;
            }
            
            .main-card {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="grid"></div>
    <div class="glow"></div>

    <div class="container">
        <div class="logo-container">
            <div class="logo">OZYMEET</div>
            <div class="tagline">Professional Trading Conference</div>
        </div>

        <div class="main-card">
            <div class="input-container">
                <input 
                    type="text" 
                    id="roomInput" 
                    placeholder="ROOM CODE"
                    maxlength="12"
                    autocomplete="off"
                >
            </div>

            <button class="btn btn-join" onclick="joinRoom()">
                JOIN ROOM
            </button>

            <div class="separator">OR</div>

            <button class="btn btn-create" onclick="createRoom()">
                CREATE NEW ROOM
            </button>
        </div>
    </div>

    <script>
        function generateRoomId() {
            return Math.random().toString(36).substring(2, 10).toUpperCase();
        }

        function joinRoom() {
            const roomInput = document.getElementById('roomInput');
            const roomId = roomInput.value.trim();
            
            if (roomId) {
                window.location.href = `/room/${roomId}`;
            } else {
                roomInput.style.borderColor = 'rgba(255, 68, 68, 0.5)';
                setTimeout(() => {
                    roomInput.style.borderColor = 'rgba(255, 255, 255, 0.08)';
                }, 500);
            }
        }

        function createRoom() {
            const roomId = generateRoomId();
            window.location.href = `/room/${roomId}`;
        }

        document.getElementById('roomInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                joinRoom();
            }
        });

        document.getElementById('roomInput').addEventListener('input', (e) => {
            e.target.value = e.target.value.toUpperCase();
        });
    </script>
</body>
</html>
