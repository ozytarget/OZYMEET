<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OZYMEET - Sala</title>
<style>
body{margin:0;font-family:Arial;background:#0f0f0f;color:#fff}
.header{background:#1e3c72;padding:15px 30px;display:flex;justify-content:space-between}
.main{display:flex;height:calc(100vh - 140px)}
.screen{flex:1;background:#1a1a1a;display:flex;align-items:center;justify-content:center;padding:20px}
#shared-screen{max-width:100%;max-height:100%;border-radius:10px}
.no-screen{text-align:center;color:#666}
.sidebar{width:300px;background:#1e1e1e;border-left:1px solid #333;padding:20px;overflow-y:auto}
.participant{background:#2a2a2a;padding:10px;border-radius:8px;margin:10px 0}
.controls{background:#1e1e1e;padding:20px;display:flex;gap:10px;justify-content:center}
button{padding:15px 25px;border:none;border-radius:10px;font-size:16px;cursor:pointer;color:#fff}
.btn-mute{background:#10b981}
.btn-mute.muted{background:#ef4444}
.btn-screen{background:#3b82f6}
.btn-screen.active{background:#ef4444}
.btn-leave{background:#ef4444}
</style>
</head>
<body>
<div class="header">
<h1>OZYMEET</h1>
<div id="room-name">Sala: ...</div>
</div>
<div class="main">
<div class="screen">
<video id="shared-screen" autoplay playsinline style="display:none"></video>
<div class="no-screen" id="no-screen-msg">
<h2>No hay pantalla compartida</h2>
<p>Esperando...</p>
</div>
</div>
<div class="sidebar">
<h3>Participantes (<span id="participant-count">0</span>)</h3>
<div id="participants-list"></div>
</div>
</div>
<div class="controls">
<button class="btn-mute" id="btn-mute"><span id="mute-icon">🎤</span> <span id="mute-text">Mutear</span></button>
<button class="btn-screen" id="btn-screen"><span id="screen-icon">🖥️</span> <span id="screen-text">Compartir</span></button>
<button class="btn-leave" id="btn-leave">Salir</button>
</div>
<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
