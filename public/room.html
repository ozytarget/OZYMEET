<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZYMEET - Sala de Conferencia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #050816 0%, #0a0e27 50%, #1a1f3a 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .room-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .top-bar {
            height: 60px;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .room-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .room-name {
            font-size: 20px;
            font-weight: 600;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .room-id {
            font-size: 14px;
            color: #8b92b8;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .screen-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .shared-screen-container {
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .shared-screen-container.active {
            display: flex;
        }

        #sharedScreen {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            background: #000;
        }

        .no-screen-message {
            text-align: center;
            color: #8b92b8;
        }

        .no-screen-message i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .no-screen-message p {
            font-size: 18px;
            opacity: 0.7;
        }

        .bottom-bar {
            height: 140px;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 255, 136, 0.2);
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 16px;
            padding: 12px 16px;
            z-index: 100;
        }

        .participants-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .section-title {
            font-size: 12px;
            color: #8b92b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .participants-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .participant-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.2s;
        }

        .participant-item:hover {
            background: rgba(0, 255, 136, 0.1);
        }

        .participant-item i {
            font-size: 10px;
            color: #00ff88;
        }

        .controls-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .control-btn.primary {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #050816;
        }

        .control-btn.primary:hover {
            box-shadow: 0 8px 16px rgba(0, 255, 136, 0.4);
        }

        .control-btn.danger {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            color: #fff;
        }

        .control-btn.danger:hover {
            box-shadow: 0 8px 16px rgba(255, 68, 68, 0.4);
        }

        .control-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            backdrop-filter: blur(10px);
        }

        .control-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .control-btn.active {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .reactions-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .reactions-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .reaction-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reaction-btn:hover {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.3);
            transform: scale(1.1);
        }

        .chat-panel {
            position: fixed;
            right: -400px;
            top: 60px;
            bottom: 140px;
            width: 400px;
            background: rgba(10, 14, 39, 0.98);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(0, 255, 136, 0.2);
            transition: right 0.3s;
            z-index: 200;
            display: flex;
            flex-direction: column;
        }

        .chat-panel.active {
            right: 0;
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 16px;
            color: #00ff88;
        }

        .chat-close {
            background: none;
            border: none;
            color: #8b92b8;
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .chat-close:hover {
            color: #fff;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-message {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
        }

        .chat-message .sender {
            color: #00ff88;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 12px;
        }

        .chat-message .text {
            color: #e0e0e0;
            word-wrap: break-word;
        }

        .chat-input-container {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 8px;
        }

        #chatInput {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        #chatInput:focus {
            border-color: rgba(0, 255, 136, 0.5);
        }

        #sendChat {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: #050816;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        #sendChat:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 255, 136, 0.4);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            max-width: 90%;
            max-height: 90%;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 20px;
            color: #00ff88;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: rgba(255, 68, 68, 0.3);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
        }

        #whiteboardModal .modal-content {
            width: 90%;
            height: 85%;
        }

        .whiteboard-controls {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .whiteboard-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px 16px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .whiteboard-btn:hover {
            background: rgba(0, 255, 136, 0.2);
            border-color: rgba(0, 255, 136, 0.5);
        }

        .whiteboard-btn.active {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            color: #00ff88;
        }

        .color-picker-container {
            position: relative;
        }

        .color-picker-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 8px;
            background: rgba(10, 14, 39, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 12px;
            padding: 12px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            z-index: 1100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        }

        .color-picker-dropdown.active {
            display: grid;
        }

        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .color-option:hover {
            transform: scale(1.15);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .color-option.selected {
            border-color: #00ff88;
            box-shadow: 0 0 12px rgba(0, 255, 136, 0.6);
        }

        .stroke-width-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #strokeWidth {
            width: 100px;
        }

        #whiteboardCanvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
            background: #ffffff;
            border-radius: 8px;
        }

        .settings-grid {
            display: grid;
            gap: 20px;
        }

        .setting-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .setting-item h3 {
            font-size: 16px;
            color: #00ff88;
            margin-bottom: 12px;
        }

        .setting-item select,
        .setting-item input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .setting-item select:focus,
        .setting-item input:focus {
            border-color: rgba(0, 255, 136, 0.5);
        }

        .floating-emoji {
            position: fixed;
            font-size: 48px;
            pointer-events: none;
            z-index: 9999;
            animation: floatUp 3s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-200px) scale(1.5);
                opacity: 0;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 136, 0.3);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 136, 0.5);
        }

        @media (max-width: 1200px) {
            .bottom-bar {
                grid-template-columns: 200px 1fr 200px;
            }
        }

        @media (max-width: 900px) {
            .bottom-bar {
                height: auto;
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .participants-section,
            .reactions-section {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="room-container">
        <div class="top-bar">
            <div class="room-info">
                <div class="room-name">OZYMEET Professional</div>
                <div class="room-id" id="roomIdDisplay">Cargando...</div>
            </div>
            <div class="connection-status">
                <div class="status-dot"></div>
                <span id="connectionStatus">Conectado</span>
            </div>
        </div>

        <div class="screen-area">
            <div class="shared-screen-container" id="sharedScreenContainer">
                <video id="sharedScreen" autoplay playsinline></video>
            </div>
            <div class="no-screen-message" id="noScreenMessage">
                <i class="fas fa-desktop"></i>
                <p>No hay pantallas compartidas</p>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="participants-section">
                <div class="section-title">
                    <i class="fas fa-users"></i> Participantes (<span id="participantCount">1</span>)
                </div>
                <div class="participants-list" id="participantsList">
                    <div class="participant-item">
                        <i class="fas fa-microphone"></i>
                        <span>Tú</span>
                    </div>
                </div>
            </div>

            <div class="controls-section">
                <button class="control-btn primary" id="toggleMic" title="Micrófono">
                    <i class="fas fa-microphone"></i>
                </button>
                
                <button class="control-btn secondary" id="shareScreen" title="Compartir Pantalla">
                    <i class="fas fa-desktop"></i>
                </button>
                
                <button class="control-btn secondary" id="openWhiteboard" title="Pizarra">
                    <i class="fas fa-pen"></i>
                </button>
                
                <button class="control-btn secondary" id="recordBtn" title="Grabar Reunión">
                    <i class="fas fa-circle"></i>
                </button>
                
                <button class="control-btn secondary" id="toggleChat" title="Chat">
                    <i class="fas fa-comment"></i>
                </button>
                
                <button class="control-btn secondary" id="settingsBtn" title="Configuración">
                    <i class="fas fa-cog"></i>
                </button>
                
                <button class="control-btn danger" id="leaveRoom" title="Salir">
                    <i class="fas fa-phone-slash"></i>
                </button>
            </div>

            <div class="reactions-section">
                <div class="section-title">
                    <i class="fas fa-smile"></i> Reacciones
                </div>
                <div class="reactions-grid">
                    <button class="reaction-btn" data-emoji="😀">😀</button>
                    <button class="reaction-btn" data-emoji="😂">😂</button>
                    <button class="reaction-btn" data-emoji="❤️">❤️</button>
                    <button class="reaction-btn" data-emoji="🔥">🔥</button>
                    <button class="reaction-btn" data-emoji="👍">👍</button>
                    <button class="reaction-btn" data-emoji="👏">👏</button>
                    <button class="reaction-btn" data-emoji="🎉">🎉</button>
                    <button class="reaction-btn" data-emoji="🚀">🚀</button>
                    <button class="reaction-btn" data-emoji="💰">💰</button>
                    <button class="reaction-btn" data-emoji="📈">📈</button>
                    <button class="reaction-btn" data-emoji="📉">📉</button>
                    <button class="reaction-btn" data-emoji="💎">💎</button>
                    <button class="reaction-btn" data-emoji="🎯">🎯</button>
                    <button class="reaction-btn" data-emoji="✨">✨</button>
                    <button class="reaction-btn" data-emoji="⚡">⚡</button>
                    <button class="reaction-btn" data-emoji="💡">💡</button>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-panel" id="chatPanel">
        <div class="chat-header">
            <h3>Chat</h3>
            <button class="chat-close" id="closeChat">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-container">
            <input type="text" id="chatInput" placeholder="Escribe un mensaje...">
            <button id="sendChat">Enviar</button>
        </div>
    </div>

    <div class="modal-overlay" id="whiteboardModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-pen"></i> Pizarra Colaborativa</h2>
                <button class="modal-close" id="closeWhiteboard">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="whiteboard-controls">
                <button class="whiteboard-btn active" id="penTool" data-tool="pen">
                    <i class="fas fa-pen"></i> Lápiz
                </button>
                <button class="whiteboard-btn" id="eraserTool" data-tool="eraser">
                    <i class="fas fa-eraser"></i> Borrador
                </button>
                
                <div class="color-picker-container">
                    <button class="whiteboard-btn" id="colorPickerBtn">
                        <i class="fas fa-palette"></i> 
                        <span id="currentColorLabel">Negro</span>
                        <div style="width: 20px; height: 20px; background: #000000; border-radius: 4px; margin-left: 8px;" id="currentColorPreview"></div>
                    </button>
                    <div class="color-picker-dropdown" id="colorPickerDropdown">
                        <div class="color-option" data-color="#000000" style="background: #000000;"></div>
                        <div class="color-option" data-color="#FF0000" style="background: #FF0000;"></div>
                        <div class="color-option" data-color="#00FF00" style="background: #00FF00;"></div>
                        <div class="color-option" data-color="#0000FF" style="background: #0000FF;"></div>
                        <div class="color-option" data-color="#FFFF00" style="background: #FFFF00;"></div>
                        <div class="color-option" data-color="#FF00FF" style="background: #FF00FF;"></div>
                        <div class="color-option" data-color="#00FFFF" style="background: #00FFFF;"></div>
                        <div class="color-option" data-color="#FFA500" style="background: #FFA500;"></div>
                        <div class="color-option" data-color="#800080" style="background: #800080;"></div>
                        <div class="color-option" data-color="#00ff88" style="background: #00ff88;"></div>
                    </div>
                </div>

                <div class="stroke-width-container">
                    <label style="color: #8b92b8; font-size: 13px;">Grosor:</label>
                    <input type="range" id="strokeWidth" min="1" max="20" value="3">
                    <span id="strokeWidthValue" style="color: #fff; font-size: 13px;">3px</span>
                </div>

                <button class="whiteboard-btn" id="clearCanvas">
                    <i class="fas fa-trash"></i> Limpiar
                </button>
            </div>
            <div class="modal-body" style="padding: 0; flex: 1; display: flex;">
                <canvas id="whiteboardCanvas"></canvas>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content" style="width: 500px;">
            <div class="modal-header">
                <h2><i class="fas fa-cog"></i> Configuración</h2>
                <button class="modal-close" id="closeSettings">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="settings-grid">
                    <div class="setting-item">
                        <h3>Micrófono</h3>
                        <select id="microphoneSelect">
                            <option>Detectando dispositivos...</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <h3>Tu Nombre</h3>
                        <input type="text" id="displayName" placeholder="Ingresa tu nombre">
                    </div>
                    <div class="setting-item">
                        <h3>Calidad de Audio</h3>
                        <select id="audioQuality">
                            <option value="high">Alta</option>
                            <option value="medium" selected>Media</option>
                            <option value="low">Baja</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script src="client.js"></script>
</body>
</html>
