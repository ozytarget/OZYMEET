<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZYMEET - Sala</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #050816 0%, #0a0e27 50%, #1a1f3a 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
        }

        .room-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        .top-bar {
            height: 60px;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 100;
        }

        .room-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .room-name {
            font-size: 20px;
            font-weight: 600;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
        }

        .user-badge {
            font-size: 13px;
            color: #8b92b8;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 6px;
        }

        .admin-badge {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            font-weight: 600;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .screen-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .shared-screen-container {
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .shared-screen-container.active {
            display: flex;
        }

        #sharedScreen {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            background: #000;
        }

        .no-screen-message {
            text-align: center;
            color: #8b92b8;
        }

        .no-screen-message i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .no-screen-message p {
            font-size: 18px;
            opacity: 0.7;
        }

        .bottom-bar {
            height: 140px;
            background: rgba(10, 14, 39, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0, 255, 136, 0.2);
            display: grid;
            grid-template-columns: 250px 1fr 250px;
            gap: 16px;
            padding: 12px 16px;
            z-index: 100;
        }

        .participants-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .section-title {
            font-size: 12px;
            color: #8b92b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .participants-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .participant-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 6px;
            font-size: 13px;
            transition: all 0.2s;
        }

        .participant-item:hover {
            background: rgba(0, 255, 136, 0.1);
        }

        .participant-item i {
            font-size: 10px;
            color: #00ff88;
        }

        .participant-item.muted i {
            color: #ff4444;
        }

        .controls-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .control-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s;
            position: relative;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        .control-btn.primary {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            color: #050816;
        }

        .control-btn.danger {
            background: linear-gradient(135deg, #ff4444 0%, #cc0000 100%);
            color: #fff;
        }

        .control-btn.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            backdrop-filter: blur(10px);
        }

        .control-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .control-btn.active {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .reactions-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .reactions-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .reaction-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 8px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reaction-btn:hover {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.3);
            transform: scale(1.1);
        }

        .chat-panel {
            position: fixed;
            right: -400px;
            top: 60px;
            bottom: 140px;
            width: 400px;
            background: rgba(10, 14, 39, 0.98);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(0, 255, 136, 0.2);
            transition: right 0.3s;
            z-index: 200;
            display: flex;
            flex-direction: column;
        }

        .chat-panel.active {
            right: 0;
        }

        .chat-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h3 {
            font-size: 16px;
            color: #00ff88;
        }

        .chat-close {
            background: none;
            border: none;
            color: #8b92b8;
            font-size: 20px;
            cursor: pointer;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-message {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
        }

        .chat-message .sender {
            color: #00ff88;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 12px;
        }

        .chat-input-container {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 8px;
        }

        #chatInput {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        #sendChat {
            background: linear-gradient(135deg, #00ff88 0%, #00cc6a 100%);
            border: none;
            border-radius: 8px;
            padding: 10px 20px;
            color: #050816;
            font-weight: 600;
            cursor: pointer;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            max-width: 90%;
            max-height: 90%;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 20px;
            color: #00ff88;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
        }

        .modal-body {
            padding: 24px;
            overflow-y: auto;
        }

        #whiteboardModal .modal-content {
            width: 90%;
            height: 85%;
        }

        .whiteboard-controls {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .whiteboard-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px 16px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .whiteboard-btn.active {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            color: #00ff88;
        }

        .color-picker-container {
            position: relative;
        }

        .color-picker-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 8px;
            background: rgba(10, 14, 39, 0.98);
            border: 1px solid rgba(0, 255, 136, 0.3);
            border-radius: 12px;
            padding: 12px;
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            z-index: 1100;
        }

        .color-picker-dropdown.active {
            display: grid;
        }

        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .color-option.selected {
            border-color: #00ff88;
        }

        #whiteboardCanvas {
            width: 100%;
            height: 100%;
            cursor: crosshair;
            background: #ffffff;
            border-radius: 8px;
        }

        .admin-panel {
            position: fixed;
            left: -350px;
            top: 60px;
            bottom: 140px;
            width: 350px;
            background: rgba(10, 14, 39, 0.98);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 255, 136, 0.2);
            transition: left 0.3s;
            z-index: 200;
            display: flex;
            flex-direction: column;
        }

        .admin-panel.active {
            left: 0;
        }

        .admin-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h3 {
            font-size: 16px;
            color: #00ff88;
        }

        .admin-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .admin-section {
            margin-bottom: 24px;
        }

        .admin-section h4 {
            font-size: 14px;
            color: #8b92b8;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .admin-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        .admin-btn {
            width: 100%;
            padding: 12px;
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid #00ff88;
            border-radius: 8px;
            color: #00ff88;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }

        .user-list-item {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .user-list-item .name {
            color: #00ff88;
            font-weight: 600;
        }

        .user-list-item .role {
            color: #8b92b8;
            font-size: 11px;
            text-transform: uppercase;
        }

        .floating-emoji {
            position: fixed;
            font-size: 48px;
            pointer-events: none;
            z-index: 9999;
            animation: floatUp 3s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-200px) scale(1.5);
                opacity: 0;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 136, 0.3);
            border-radius: 4px;
        }

        @media (max-width: 900px) {
            .bottom-bar {
                height: auto;
                grid-template-columns: 1fr;
            }
            
            .participants-section,
            .reactions-section {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="room-container">
        <div class="top-bar">
            <div class="room-info">
                <div class="room-name">OZYMEET</div>
                <div class="user-badge" id="userBadge">Cargando...</div>
            </div>
            <div class="connection-status">
                <div class="status-dot"></div>
                <span id="connectionStatus">Conectando...</span>
            </div>
        </div>

        <div class="screen-area">
            <div class="shared-screen-container" id="sharedScreenContainer">
                <video id="sharedScreen" autoplay playsinline></video>
            </div>
            <div class="no-screen-message" id="noScreenMessage">
                <i class="fas fa-desktop"></i>
                <p>No hay pantallas compartidas</p>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="participants-section">
                <div class="section-title">
                    <i class="fas fa-users"></i> Participantes (<span id="participantCount">0</span>)
                </div>
                <div class="participants-list" id="participantsList"></div>
            </div>

            <div class="controls-section">
                <button class="control-btn primary" id="toggleMic" title="Micrófono">
                    <i class="fas fa-microphone"></i>
                </button>
                
                <button class="control-btn secondary" id="shareScreen" title="Compartir Pantalla">
                    <i class="fas fa-desktop"></i>
                </button>
                
                <button class="control-btn secondary" id="openWhiteboard" title="Pizarra">
                    <i class="fas fa-pen"></i>
                </button>
                
                <button class="control-btn secondary" id="recordBtn" title="Grabar">
                    <i class="fas fa-circle"></i>
                </button>
                
                <button class="control-btn secondary" id="toggleChat" title="Chat">
                    <i class="fas fa-comment"></i>
                </button>
                
                <button class="control-btn secondary admin-only" id="toggleAdmin" title="Admin" style="display: none;">
                    <i class="fas fa-cog"></i>
                </button>
                
                <button class="control-btn danger" id="leaveRoom" title="Salir">
                    <i class="fas fa-phone-slash"></i>
                </button>
            </div>

            <div class="reactions-section">
                <div class="section-title">
                    <i class="fas fa-smile"></i> Reacciones
                </div>
                <div class="reactions-grid">
                    <button class="reaction-btn" data-emoji="😀">😀</button>
                    <button class="reaction-btn" data-emoji="😂">😂</button>
                    <button class="reaction-btn" data-emoji="❤️">❤️</button>
                    <button class="reaction-btn" data-emoji="🔥">🔥</button>
                    <button class="reaction-btn" data-emoji="👍">👍</button>
                    <button class="reaction-btn" data-emoji="👏">👏</button>
                    <button class="reaction-btn" data-emoji="🎉">🎉</button>
                    <button class="reaction-btn" data-emoji="🚀">🚀</button>
                    <button class="reaction-btn" data-emoji="💰">💰</button>
                    <button class="reaction-btn" data-emoji="📈">📈</button>
                    <button class="reaction-btn" data-emoji="📉">📉</button>
                    <button class="reaction-btn" data-emoji="💎">💎</button>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-panel" id="chatPanel">
        <div class="chat-header">
            <h3>Chat</h3>
            <button class="chat-close" id="closeChat">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-container">
            <input type="text" id="chatInput" placeholder="Mensaje...">
            <button id="sendChat">Enviar</button>
        </div>
    </div>

    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h3><i class="fas fa-shield-alt"></i> Panel Admin</h3>
            <button class="chat-close" id="closeAdmin">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="admin-content">
            <div class="admin-section">
                <h4>Crear Usuario</h4>
                <input type="text" class="admin-input" id="newUserName" placeholder="Nombre">
                <input type="text" class="admin-input" id="newUserPassword" placeholder="Password">
                <select class="admin-input" id="newUserRole">
                    <option value="participant">Participante</option>
                    <option value="host">Host</option>
                </select>
                <button class="admin-btn" id="createUserBtn">Crear Usuario</button>
            </div>

            <div class="admin-section">
                <h4>Usuarios Registrados</h4>
                <div id="usersList"></div>
                <button class="admin-btn" id="refreshUsersBtn" style="margin-top: 12px;">Actualizar Lista</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="whiteboardModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-pen"></i> Pizarra</h2>
                <button class="modal-close" id="closeWhiteboard">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="whiteboard-controls">
                <button class="whiteboard-btn active" id="penTool" data-tool="pen">
                    <i class="fas fa-pen"></i> Lápiz
                </button>
                <button class="whiteboard-btn" id="eraserTool" data-tool="eraser">
                    <i class="fas fa-eraser"></i> Borrador
                </button>
                
                <div class="color-picker-container">
                    <button class="whiteboard-btn" id="colorPickerBtn">
                        <i class="fas fa-palette"></i> Color
                        <div style="width: 20px; height: 20px; background: #000; border-radius: 4px; margin-left: 8px;" id="currentColorPreview"></div>
                    </button>
                    <div class="color-picker-dropdown" id="colorPickerDropdown">
                        <div class="color-option" data-color="#000000" style="background: #000;"></div>
                        <div class="color-option" data-color="#FF0000" style="background: #F00;"></div>
                        <div class="color-option" data-color="#00FF00" style="background: #0F0;"></div>
                        <div class="color-option" data-color="#0000FF" style="background: #00F;"></div>
                        <div class="color-option" data-color="#FFFF00" style="background: #FF0;"></div>
                        <div class="color-option" data-color="#FF00FF" style="background: #F0F;"></div>
                        <div class="color-option" data-color="#00FFFF" style="background: #0FF;"></div>
                        <div class="color-option" data-color="#FFA500" style="background: #FFA500;"></div>
                        <div class="color-option" data-color="#800080" style="background: #800080;"></div>
                        <div class="color-option" data-color="#00ff88" style="background: #00ff88;"></div>
                    </div>
                </div>

                <button class="whiteboard-btn" id="clearCanvas">
                    <i class="fas fa-trash"></i> Limpiar
                </button>
            </div>
            <div class="modal-body" style="padding: 0; flex: 1; display: flex;">
                <canvas id="whiteboardCanvas"></canvas>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"></script>
    <script>
        // ============================================
        // VERIFICAR AUTENTICACIÓN
        // ============================================
        const authData = JSON.parse(sessionStorage.getItem('ozymeet_auth') || '{}');
        
        if (!authData.userName || !authData.password) {
            window.location.href = '/';
        }

        const socket = io();
        const peers = {};
        const audioElements = new Map();

        let localStream = null;
        let screenStream = null;
        let mediaRecorder = null;
        let currentTool = 'pen';
        let currentColor = '#000000';
        let isDrawing = false;
        let whiteboardContext = null;

        const roomId = window.location.pathname.split('/').pop();
        const userName = authData.userName;
        const userRole = authData.role || 'participant';

        // Mostrar badge de usuario
        const badge = document.getElementById('userBadge');
        if (userRole === 'admin') {
            badge.textContent = `👑 ${userName} (Admin)`;
            badge.classList.add('admin-badge');
            document.getElementById('toggleAdmin').style.display = 'flex';
        } else if (userRole === 'host') {
            badge.textContent = `🎯 ${userName} (Host)`;
        } else {
            badge.textContent = userName;
        }

        // ============================================
        // INICIALIZACIÓN
        // ============================================
        async function init() {
            try {
                console.log('🎤 Iniciando audio...');
                
                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    },
                    video: false
                });

                console.log('✅ Audio capturado');
                
                socket.emit('join-room', {
                    roomId: roomId,
                    userName: userName,
                    password: authData.password
                });
                
                initControls();
                initWhiteboard();
                initChat();
                initAdmin();
                
            } catch (error) {
                console.error('❌ Error:', error);
                alert('Error al acceder al micrófono');
            }
        }

        // ============================================
        // SOCKET EVENTOS
        // ============================================
        socket.on('joined-room', ({ userData, roomData, existingUsers }) => {
            console.log('✅ Unido a sala');
            document.getElementById('connectionStatus').textContent = 'Conectado';
            
            existingUsers.forEach(user => {
                if (user.userId !== socket.id) {
                    connectToNewUser(user.userId);
                }
            });
            
            updateParticipantsList();
        });

        socket.on('user-connected', ({ userId, userName }) => {
            console.log('👤 Usuario conectado:', userName);
            connectToNewUser(userId);
        });

        socket.on('user-disconnected', userId => {
            console.log('👋 Usuario desconectado');
            if (peers[userId]) {
                peers[userId].destroy();
                delete peers[userId];
            }
            
            if (audioElements.has(userId)) {
                audioElements.get(userId).remove();
                audioElements.delete(userId);
            }
            
            updateParticipantsList();
        });

        socket.on('chat-message', ({ userId, userName, message }) => {
            addChatMessage(userName, message);
        });

        socket.on('reaction', ({ emoji }) => {
            showFloatingEmoji(emoji);
        });

        socket.on('draw-line', (data) => {
            if (whiteboardContext) {
                drawOnCanvas(data);
            }
        });

        socket.on('clear-drawing', () => {
            if (whiteboardContext) {
                clearWhiteboardCanvas();
            }
        });

        // ============================================
        // WEBRTC
        // ============================================
        function connectToNewUser(userId) {
            if (!localStream) return;
            
            try {
                const peer = new SimplePeer({
                    initiator: true,
                    trickle: false,
                    stream: localStream,
                    config: {
                        iceServers: [
                            { urls: 'stun:stun.l.google.com:19302' }
                        ]
                    }
                });

                peer.on('signal', signal => {
                    socket.emit('signal', { to: userId, signal, roomId });
                });

                peer.on('stream', remoteStream => {
                    addAudioStream(userId, remoteStream);
                });

                peer.on('error', err => {
                    console.error('Error peer:', err);
                });

                peers[userId] = peer;
                
            } catch (error) {
                console.error('Error conectando:', error);
            }
        }

        socket.on('signal', ({ from, signal }) => {
            try {
                if (peers[from]) {
                    peers[from].signal(signal);
                } else {
                    const peer = new SimplePeer({
                        initiator: false,
                        trickle: false,
                        stream: localStream,
                        config: {
                            iceServers: [
                                { urls: 'stun:stun.l.google.com:19302' }
                            ]
                        }
                    });

                    peer.on('signal', responseSignal => {
                        socket.emit('signal', { to: from, signal: responseSignal, roomId });
                    });

                    peer.on('stream', remoteStream => {
                        addAudioStream(from, remoteStream);
                    });

                    peer.on('error', err => {
                        console.error('Error peer:', err);
                    });

                    peer.signal(signal);
                    peers[from] = peer;
                }
            } catch (error) {
                console.error('Error señal:', error);
            }
        });

        function addAudioStream(userId, stream) {
            if (audioElements.has(userId)) {
                audioElements.get(userId).srcObject = stream;
                return;
            }

            const audio = document.createElement('audio');
            audio.srcObject = stream;
            audio.autoplay = true;
            audio.playsInline = true;
            
            const playAudio = async (retries = 3) => {
                try {
                    await audio.play();
                    console.log('✅ Audio reproduciendo');
                } catch (error) {
                    if (retries > 0) {
                        setTimeout(() => playAudio(retries - 1), 1000);
                    }
                }
            };

            document.body.appendChild(audio);
            audioElements.set(userId, audio);
            playAudio();
            updateParticipantsList();
        }

        function updateParticipantsList() {
            const list = document.getElementById('participantsList');
            const count = document.getElementById('participantCount');
            
            const total = Object.keys(peers).length + 1;
            count.textContent = total;
            
            list.innerHTML = `
                <div class="participant-item">
                    <i class="fas fa-microphone"></i>
                    <span>Tú (${userRole})</span>
                </div>
            `;
            
            Object.keys(peers).forEach((id, i) => {
                list.innerHTML += `
                    <div class="participant-item">
                        <i class="fas fa-microphone"></i>
                        <span>Usuario ${i + 1}</span>
                    </div>
                `;
            });
        }

        // ============================================
        // CONTROLES
        // ============================================
        function initControls() {
            const toggleMic = document.getElementById('toggleMic');
            const shareScreen = document.getElementById('shareScreen');
            const openWhiteboard = document.getElementById('openWhiteboard');
            const recordBtn = document.getElementById('recordBtn');
            const toggleChat = document.getElementById('toggleChat');
            const leaveRoom = document.getElementById('leaveRoom');

            let isMuted = false;
            toggleMic.addEventListener('click', () => {
                isMuted = !isMuted;
                if (localStream) {
                    localStream.getAudioTracks()[0].enabled = !isMuted;
                }
                toggleMic.classList.toggle('danger', isMuted);
                toggleMic.classList.toggle('primary', !isMuted);
                toggleMic.querySelector('i').className = isMuted ? 'fas fa-microphone-slash' : 'fas fa-microphone';
            });

            shareScreen.addEventListener('click', startScreenShare);
            openWhiteboard.addEventListener('click', () => {
                document.getElementById('whiteboardModal').classList.add('active');
                resizeWhiteboardCanvas();
            });

            toggleChat.addEventListener('click', () => {
                document.getElementById('chatPanel').classList.toggle('active');
            });

            leaveRoom.addEventListener('click', () => {
                if (confirm('¿Salir de la sala?')) {
                    sessionStorage.removeItem('ozymeet_auth');
                    window.location.href = '/';
                }
            });

            document.querySelectorAll('.reaction-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const emoji = btn.dataset.emoji;
                    socket.emit('reaction', { emoji, roomId, userId: socket.id, userName });
                    showFloatingEmoji(emoji);
                });
            });
        }

        async function startScreenShare() {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({
                    video: { cursor: 'always' },
                    audio: false
                });

                document.getElementById('sharedScreen').srcObject = screenStream;
                document.getElementById('sharedScreenContainer').classList.add('active');
                document.getElementById('noScreenMessage').style.display = 'none';

                screenStream.getVideoTracks()[0].onended = () => {
                    document.getElementById('sharedScreenContainer').classList.remove('active');
                    document.getElementById('noScreenMessage').style.display = 'block';
                };

            } catch (error) {
                console.error('Error compartir pantalla:', error);
            }
        }

        // ============================================
        // PIZARRA
        // ============================================
        function initWhiteboard() {
            const canvas = document.getElementById('whiteboardCanvas');
            whiteboardContext = canvas.getContext('2d');

            document.getElementById('closeWhiteboard').addEventListener('click', () => {
                document.getElementById('whiteboardModal').classList.remove('active');
            });

            document.querySelectorAll('.whiteboard-btn[data-tool]').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.whiteboard-btn[data-tool]').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTool = btn.dataset.tool;
                });
            });

            const colorPickerBtn = document.getElementById('colorPickerBtn');
            const colorPickerDropdown = document.getElementById('colorPickerDropdown');

            colorPickerBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                colorPickerDropdown.classList.toggle('active');
            });

            document.querySelectorAll('.color-option').forEach(option => {
                option.addEventListener('click', () => {
                    currentColor = option.dataset.color;
                    document.getElementById('currentColorPreview').style.background = currentColor;
                    document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
                    option.classList.add('selected');
                    colorPickerDropdown.classList.remove('active');
                });
            });

            document.getElementById('clearCanvas').addEventListener('click', () => {
                clearWhiteboardCanvas();
                socket.emit('clear-drawing', { roomId });
            });

            let lastX = 0;
            let lastY = 0;

            canvas.addEventListener('mousedown', (e) => {
                isDrawing = true;
                const rect = canvas.getBoundingClientRect();
                lastX = e.clientX - rect.left;
                lastY = e.clientY - rect.top;
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const drawData = {
                    tool: currentTool,
                    color: currentColor,
                    fromX: lastX,
                    fromY: lastY,
                    toX: x,
                    toY: y
                };

                drawOnCanvas(drawData);
                socket.emit('draw-line', { roomId, ...drawData });

                lastX = x;
                lastY = y;
            });

            canvas.addEventListener('mouseup', () => {
                isDrawing = false;
            });
        }

        function drawOnCanvas(data) {
            if (!whiteboardContext) return;

            whiteboardContext.beginPath();
            whiteboardContext.moveTo(data.fromX, data.fromY);
            whiteboardContext.lineTo(data.toX, data.toY);
            
            if (data.tool === 'pen') {
                whiteboardContext.strokeStyle = data.color;
                whiteboardContext.lineWidth = 3;
            } else {
                whiteboardContext.strokeStyle = '#ffffff';
                whiteboardContext.lineWidth = 10;
            }
            
            whiteboardContext.lineCap = 'round';
            whiteboardContext.stroke();
        }

        function clearWhiteboardCanvas() {
            if (!whiteboardContext) return;
            const canvas = document.getElementById('whiteboardCanvas');
            whiteboardContext.clearRect(0, 0, canvas.width, canvas.height);
        }

        function resizeWhiteboardCanvas() {
            const canvas = document.getElementById('whiteboardCanvas');
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }

        // ============================================
        // CHAT
        // ============================================
        function initChat() {
            const chatInput = document.getElementById('chatInput');
            const sendChat = document.getElementById('sendChat');
            const closeChat = document.getElementById('closeChat');

            sendChat.addEventListener('click', sendChatMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendChatMessage();
            });

            closeChat.addEventListener('click', () => {
                document.getElementById('chatPanel').classList.remove('active');
            });
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (message) {
                socket.emit('chat-message', { roomId, userId: socket.id, userName, message });
                addChatMessage('Tú', message);
                input.value = '';
            }
        }

        function addChatMessage(sender, message) {
            const messages = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'chat-message';
            div.innerHTML = `
                <div class="sender">${sender}</div>
                <div class="text">${message}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        // ============================================
        // ADMIN PANEL
        // ============================================
        function initAdmin() {
            if (userRole !== 'admin') return;

            const toggleAdmin = document.getElementById('toggleAdmin');
            const closeAdmin = document.getElementById('closeAdmin');
            const createUserBtn = document.getElementById('createUserBtn');
            const refreshUsersBtn = document.getElementById('refreshUsersBtn');

            toggleAdmin.addEventListener('click', () => {
                document.getElementById('adminPanel').classList.toggle('active');
                loadUsersList();
            });

            closeAdmin.addEventListener('click', () => {
                document.getElementById('adminPanel').classList.remove('active');
            });

            createUserBtn.addEventListener('click', async () => {
                const name = document.getElementById('newUserName').value.trim();
                const password = document.getElementById('newUserPassword').value.trim();
                const role = document.getElementById('newUserRole').value;

                if (!name || !password) {
                    alert('Completa todos los campos');
                    return;
                }

                try {
                    const response = await fetch('/admin/create-user', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            adminPassword: authData.password,
                            newUserName: name,
                            newUserPassword: password,
                            newUserRole: role
                        })
                    });

                    const data = await response.json();

                    if (data.success) {
                        alert('✅ Usuario creado');
                        document.getElementById('newUserName').value = '';
                        document.getElementById('newUserPassword').value = '';
                        loadUsersList();
                    } else {
                        alert('❌ ' + data.message);
                    }

                } catch (error) {
                    console.error('Error:', error);
                    alert('Error al crear usuario');
                }
            });

            refreshUsersBtn.addEventListener('click', loadUsersList);
        }

        async function loadUsersList() {
            try {
                const response = await fetch('/admin/list-users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminPassword: authData.password
                    })
                });

                const data = await response.json();

                if (data.success) {
                    const list = document.getElementById('usersList');
                    list.innerHTML = '';

                    data.users.forEach(user => {
                        list.innerHTML += `
                            <div class="user-list-item">
                                <div class="name">${user.name}</div>
                                <div class="role">${user.role} • ${user.password}</div>
                            </div>
                        `;
                    });
                }

            } catch (error) {
                console.error('Error:', error);
            }
        }

        // ============================================
        // EMOJIS
        // ============================================
        function showFloatingEmoji(emoji) {
            const el = document.createElement('div');
            el.className = 'floating-emoji';
            el.textContent = emoji;
            el.style.left = `${Math.random() * (window.innerWidth - 100) + 50}px`;
            el.style.bottom = '150px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        // ============================================
        // INICIAR
        // ============================================
        window.addEventListener('load', init);

        window.addEventListener('beforeunload', () => {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            Object.values(peers).forEach(peer => peer.destroy());
        });
    </script>
</body>
</html>
