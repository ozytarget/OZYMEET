<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OZYMEET - Sala de Reunión</title>
    <link rel="stylesheet" href="styles.css">
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
</head>
<body>
    <!-- HEADER CON CONTROLES PRINCIPALES -->
    <div class="room-header">
        <div class="room-info">
            <h2>🎯 OZYMEET</h2>
            <div class="room-code">Código de sala: <span id="roomCodeDisplay"></span></div>
        </div>
        
        <div class="controls">
            <!-- Botón Micrófono -->
            <button class="control-btn" id="micBtn" onclick="toggleMic()" title="Activar/Desactivar Micrófono">
                <span id="micIcon">🎤</span> Micrófono
            </button>
            
            <!-- Botón Pantalla -->
            <button class="control-btn" id="screenBtn" onclick="toggleScreenShare()" title="Compartir Pantalla">
                <span>🖥️</span> Pantalla
            </button>
            
            <!-- Botón Dibujar -->
            <button class="control-btn" id="drawBtn" onclick="toggleDrawMode()" title="Activar Lápiz">
                <span>✏️</span> Dibujar
            </button>
            
            <!-- Botón Pizarra -->
            <button class="control-btn" id="whiteboardBtn" onclick="toggleWhiteboard()" title="Pizarra Compartida">
                <span>📝</span> Pizarra
            </button>
            
            <!-- Botón Grabar -->
            <button class="control-btn" id="recordBtn" onclick="toggleRecording()" title="Grabar Reunión">
                <span>🔴</span> Grabar
            </button>
            
            <!-- Botón Levantar Mano -->
            <button class="control-btn" id="handBtn" onclick="raiseHand()" title="Levantar Mano">
                <span>✋</span> Mano
            </button>
            
            <!-- Botón Configuración -->
            <button class="control-btn" id="settingsBtn" onclick="openSettings()" title="Configuración">
                <span>⚙️</span> Config
            </button>
            
            <!-- Indicador de Grabación -->
            <div class="recording-indicator" id="recordingIndicator">
                <div class="recording-dot"></div>
                <span>GRABANDO</span>
            </div>
        </div>
        
        <!-- Reacciones -->
        <div class="reactions-bar">
            <button class="reaction-btn" onclick="sendReaction('👍')" title="Me gusta">👍</button>
            <button class="reaction-btn" onclick="sendReaction('❤️')" title="Me encanta">❤️</button>
            <button class="reaction-btn" onclick="sendReaction('😂')" title="Risa">😂</button>
            <button class="reaction-btn" onclick="sendReaction('👏')" title="Aplauso">👏</button>
            <button class="reaction-btn" onclick="sendReaction('🎉')" title="Celebración">🎉</button>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content">
        <!-- ÁREA DE PANTALLAS COMPARTIDAS -->
        <div class="screen-area">
            <div class="screen-grid" id="screenContainer">
                <!-- Videos de pantalla compartida se agregan aquí dinámicamente -->
            </div>
            
            <!-- Canvas para dibujar sobre pantallas -->
            <canvas id="drawCanvas"></canvas>
            
            <!-- Herramientas de dibujo -->
            <div class="draw-tools" id="drawTools">
                <div class="color-picker">
                    <div class="color-btn" style="background: #FF0000;" onclick="setDrawColor('#FF0000')"></div>
                    <div class="color-btn" style="background: #00FF00;" onclick="setDrawColor('#00FF00')"></div>
                    <div class="color-btn" style="background: #0000FF;" onclick="setDrawColor('#0000FF')"></div>
                    <div class="color-btn" style="background: #FFFF00;" onclick="setDrawColor('#FFFF00')"></div>
                    <div class="color-btn" style="background: #000000;" onclick="setDrawColor('#000000')"></div>
                </div>
                <button class="control-btn" onclick="clearDrawing()" style="padding: 8px 15px;">
                    <span>🗑️</span> Limpiar
                </button>
            </div>
            
            <!-- Pizarra Compartida -->
            <div class="whiteboard-container" id="whiteboardContainer">
                <canvas id="whiteboardCanvas"></canvas>
            </div>
        </div>

        <!-- SIDEBAR DERECHO -->
        <div class="sidebar">
            <!-- CHAT -->
            <div class="chat-container">
                <h3>💬 Chat</h3>
                <div class="chat-messages" id="chatMessages">
                    <!-- Mensajes aparecen aquí -->
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Escribe un mensaje..." onkeypress="handleChatKey(event)">
                    <button onclick="sendChatMessage()">Enviar</button>
                </div>
            </div>

            <!-- PARTICIPANTES -->
            <div class="participants-container">
                <h3>👥 Participantes (<span id="participantCount">1</span>)</h3>
                <div id="participantsList">
                    <!-- Lista de participantes aparece aquí -->
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DE CONFIGURACIÓN -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <h2>⚙️ Configuración</h2>
            
            <label>Tu Nombre:</label>
            <input type="text" id="userNameInput" placeholder="Ingresa tu nombre" value="">
            
            <label>Contraseña de Sala (Host):</label>
            <input type="password" id="roomPasswordInput" placeholder="Opcional - solo para host">
            
            <label>Rol:</label>
            <select id="roleSelect" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; background: rgba(255,255,255,0.1); color: white; border: 2px solid rgba(255,255,255,0.3);">
                <option value="participant">👤 Participante</option>
                <option value="host">👑 Host</option>
            </select>
            
            <div class="modal-buttons">
                <button class="control-btn" onclick="closeSettings()">Cancelar</button>
                <button class="control-btn active" onclick="saveSettings()">Guardar</button>
            </div>
        </div>
    </div>

    <!-- MODAL DE NOMBRE AL ENTRAR -->
    <div class="modal active" id="welcomeModal">
        <div class="modal-content">
            <h2>👋 ¡Bienvenido a OZYMEET!</h2>
            <p style="margin-bottom: 20px; opacity: 0.9;">Ingresa tu nombre para unirte a la sala</p>
            
            <input type="text" id="welcomeNameInput" placeholder="Tu nombre" autofocus>
            
            <label style="display: block; margin-bottom: 5px; font-size: 14px;">Contraseña de sala (si tiene):</label>
            <input type="password" id="welcomePasswordInput" placeholder="Dejar vacío si no hay contraseña">
            
            <div class="modal-buttons" style="margin-top: 20px;">
                <button class="control-btn active" onclick="joinRoom()" style="width: 100%;">
                    🚀 Unirse a la Sala
                </button>
            </div>
        </div>
    </div>

    <!-- Script Principal -->
    <script src="client.js"></script>
    
    <script>
        // Mostrar código de sala en header
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room');
        document.getElementById('roomCodeDisplay').textContent = roomCode || 'N/A';
        
        // Función para unirse a la sala
        function joinRoom() {
            const name = document.getElementById('welcomeNameInput').value.trim();
            const password = document.getElementById('welcomePasswordInput').value;
            
            if (!name) {
                alert('⚠️ Por favor ingresa tu nombre');
                return;
            }
            
            // Guardar nombre en localStorage
            localStorage.setItem('userName', name);
            localStorage.setItem('roomPassword', password);
            
            // Cerrar modal y empezar
            document.getElementById('welcomeModal').classList.remove('active');
            startAudio();
        }
        
        // Presionar Enter para unirse
        document.getElementById('welcomeNameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') joinRoom();
        });
        
        // Copiar código de sala
        document.getElementById('roomCodeDisplay').addEventListener('click', () => {
            navigator.clipboard.writeText(roomCode);
            alert('✅ Código copiado al portapapeles');
        });
    </script>
</body>
</html>
